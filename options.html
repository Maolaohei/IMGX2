<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mix01 Immersive Engine 配置</title>
    <style>
        /* 纯净毛玻璃 & 动态主题系统 */
        :root {
            --primary: #1da1f2;
            --primary-hover: #40a9ff;
            --glass-bg: rgba(20, 20, 20, 0.4); 
            --card-bg: rgba(30, 30, 30, 0.4);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --border: rgba(255, 255, 255, 0.15);
            --input-bg: rgba(0, 0, 0, 0.4);
            --success-color: #4ade80;
            --danger-color: #ff8a8a;
            --radius: 12px;
            --panel-blur: 20px;
        }

        body.theme-light {
            --glass-bg: rgba(255, 255, 255, 0.5); 
            --card-bg: rgba(255, 255, 255, 0.6);
            --text-main: #111111;
            --text-muted: #444444;
            --border: rgba(0, 0, 0, 0.2);
            --input-bg: rgba(255, 255, 255, 0.7);
            --success-color: #16a34a;
            --danger-color: #dc2626;
        }

       ::-webkit-scrollbar {
        display: none; /* 针对 Chrome, Safari 和 Edge */
    }
    html, body {
        scrollbar-width: none; /* 针对 Firefox */
        -ms-overflow-style: none; /* 针对 IE/Edge */
        overflow-y: auto; /* 允许滚动但隐藏条 */
    }
        body { 
            width: 420px; margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            
            color: var(--text-main); background-color: #1e1e1e;
            background-color: transparent; /* 设为透明，露出最底层的背景图层 */
            transition: background-color 0.5s ease, color 0.3s ease;
            overflow-x: hidden;
        }

        /* 🚀 核心修复：提升背景层级到 0，面板层级到 10，完美挣脱 body 背景黑屏遮挡 */
        #mix01-bg-layer {
            position: fixed; top: -2px; left: -2px; right: -2px; bottom: -2px;
            z-index: -1; /* 修改前为 -3，导致被夹层覆盖 */
            pointer-events: none; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            background-color: #1e1e1e; /* 这里放兜底色，确保图片加载前不闪白 */
        }
        #mix01-bg-img {
            width: 100%; height: 100%; object-fit: cover;
            will-change: transform; display: none;
        }

        /* 🚀 核心修复：为面板包裹层创建独立堆叠上下文，确保凌驾于背景图片之上 */
        .panel-wrapper {
        position: relative; 
        z-index: 10; 
        width: 100%; 
        padding: 20px; 
        box-sizing: border-box; 
        min-height: 100vh;
        /* 核心改动：全屏磨砂 */
        backdrop-filter: blur(var(--panel-blur)) saturate(150%);
        -webkit-backdrop-filter: blur(var(--panel-blur)) saturate(150%);
        /* 增加一层极淡的底色，让模糊效果更有质感 */
        background: rgba(20, 20, 20, 0.05); 
        transition: opacity 0.3s ease, filter 0.3s ease, transform 0.3s ease, backdrop-filter 0.3s ease;
    }
    /* 适配亮色主题下的全局背景色 */
    body.theme-light .panel-wrapper {
        background: rgba(255, 255, 255, 0.1);
    }

        /* 编辑模式交互 */
        body.bg-edit-mode { cursor: grab; overflow: hidden; }
        body.bg-edit-mode:active { cursor: grabbing; }
        body.bg-edit-mode .panel-wrapper {
            opacity: 0.05; filter: blur(8px); transform: scale(0.98); pointer-events: none;
        }

        #bgEditOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; justify-content: center; align-items: flex-end; padding-bottom: 40px;
            z-index: 1000; pointer-events: none;
        }
        #bgEditOverlay::before {
            content: '拖拽移动位置 · 滚轮缩放大小';
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
            color: #fff; font-weight: bold; text-shadow: 0 2px 10px #000; font-size: 14px;
            background: rgba(0,0,0,0.5); padding: 8px 16px; border-radius: 20px; backdrop-filter: blur(5px);
        }
        body.bg-edit-mode #bgEditOverlay { display: flex; }
        
        #saveBgPosBtn {
            pointer-events: auto; padding: 14px 40px; font-size: 15px; border-radius: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8), 0 0 20px var(--primary); border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        #saveBgPosBtn:hover { transform: translateY(-3px) scale(1.05); }

        h3 { margin: 0 0 12px 0; font-size: 14px; color: var(--primary); font-weight: 700; letter-spacing: 0.5px; transition: color 0.5s ease; }
        
        .tabs { 
            display: flex; background: var(--glass-bg); 
            backdrop-filter: blur(var(--panel-blur)); -webkit-backdrop-filter: blur(var(--panel-blur));
            padding: 4px; border-radius: 40px; margin-bottom: 20px; border: 1px solid var(--border);
        }
        .tab-btn { flex: 1; padding: 8px 0; border: none; background: transparent; border-radius: 30px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text-muted); transition: all 0.3s ease; }
        .tab-btn.active { background: var(--primary); color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-shadow: none; }
        
        /* 苹果级顺滑回弹动画 */
        .tab-content { display: none; min-height: 320px; }
        .tab-content.active { 
            display: block; 
            animation: fade-in-smooth 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes fade-in-smooth {
            0% { opacity: 0; transform: translateY(12px) scale(0.98); }
            60% { opacity: 1; transform: translateY(-2px) scale(1.01); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card { 
        background: var(--card-bg); 
        border-radius: var(--radius); 
        padding: 4px 16px; 
        margin-bottom: 20px; 
        border: 1px solid var(--border); 
        box-shadow: 0 8px 32px rgba(0,0,0,0.05);
    }
        .row { padding: 12px 0; display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: 500; border-bottom: 1px dashed var(--border); }
        .row:last-child { border-bottom: none; }
        .row.vertical { flex-direction: column; align-items: flex-start; gap: 8px; }
        
        input[type="number"], input[type="text"], select { background: var(--input-bg); color: var(--text-main); border: 1px solid var(--border); border-radius: 8px; outline: none; transition: 0.2s; font-family: ui-monospace, monospace; font-size: 12px; }
        input[type="number"] { width: 64px; padding: 6px 8px; text-align: center; }
        input[type="text"] { width: 44px; padding: 6px; text-align: center; text-transform: uppercase; font-weight: bold; }
        input.wide-input { width: 100%; box-sizing: border-box; text-transform: none; text-align: left; font-weight: normal; padding: 8px; }
        select { padding: 6px 10px; cursor: pointer; }
        input:focus, select:focus { border-color: var(--primary); }

        input[type=range] { -webkit-appearance: none; width: 100px; background: transparent; }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: var(--input-bg); border-radius: 3px; border: 1px solid var(--border); }
        input[type=range]::-webkit-slider-thumb { height: 16px; width: 16px; border-radius: 50%; background: var(--primary); cursor: pointer; -webkit-appearance: none; margin-top: -6px; box-shadow: 0 2px 6px rgba(0,0,0,0.5); border: 2px solid #fff; transition: transform 0.1s; }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }

        .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--input-bg); transition: .3s; border-radius: 22px; border: 1px solid var(--border); }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: var(--text-muted); transition: .3s ease; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); filter: brightness(0.6); border-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(18px); background-color: var(--primary); filter: brightness(1.8); }

        .bg-picker-row { display: flex; gap: 6px; width: 100%; margin-top: 4px; }
        .bg-btn { flex: 1; padding: 8px 4px; font-size: 11px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text-main); cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .bg-btn:hover { border-color: var(--primary); }
        .bg-btn.active-bg { background: var(--primary); color: #fff; border-color: var(--primary); }

        .btn-container { display: flex; flex-direction: column; gap: 10px; margin-top: 24px; }
        .btn { border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.5s ease, transform 0.2s; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn-secondary { background: var(--glass-bg); color: var(--text-main); border: 1px solid var(--border); backdrop-filter: blur(10px); }
        .btn-secondary:hover { border-color: var(--primary); }
        
        .success-text { color: var(--success-color); font-size: 13px; display: none; text-align: center; margin-top: 12px; font-weight: 600; }
        
        .history-box { max-height: 200px; overflow-y: auto; font-size: 12px; margin-bottom: 4px; word-break: break-all; padding: 0 4px; }
        .history-item { padding: 10px 0; border-bottom: 1px dashed var(--border); }
        .history-item:last-child { border-bottom: none; }
        .history-item-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .footer { margin-top: 20px; font-size: 11px; color: var(--text-muted); text-align: center; font-family: ui-monospace, monospace; }
        
        /* 彻底消除黑线的关键：透明滚动条轨道 */
        ::-webkit-scrollbar { width: 4px; background: transparent; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
        
        #disclaimerOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); z-index: 100; padding: 30px; box-sizing: border-box; display: none; flex-direction: column; justify-content: center; text-align: center; }
        .disclaimer-box { font-size: 13px; color: #fff; background: rgba(30,30,30,0.8); border: 1px solid rgba(255,255,255,0.2); padding: 16px; border-radius: var(--radius); margin: 20px 0; line-height: 1.6; text-align: left; }
        #agreedStatus { font-size: 12px; color: var(--success-color); font-weight: 600; display: none; margin-bottom: 16px; text-align: center; background: var(--input-bg); border: 1px solid var(--border); padding: 6px; border-radius: 8px; backdrop-filter: blur(5px); }
    </style>
</head>
<body>
    <div id="mix01-bg-layer">
        <img id="mix01-bg-img" src="" alt="">
    </div>

    <div id="bgEditOverlay"><button id="saveBgPosBtn" class="btn btn-primary">✅ 完成定位与缩放</button></div>

    <div id="disclaimerOverlay">
        <h2 style="color:var(--danger-color); margin-bottom: 0;">🛡️ 许可协议</h2>
        <div class="disclaimer-box">
            本引擎承诺完全本地运行，无任何遥测或数据收集行为。其设计初衷仅为优化极客用户的本地媒体浏览体验。<br><br>
            <b>注意：</b>因使用本软件引发的任何版权、数据或网络风控问题，由使用者自行承担。继续操作即代表您同意此条款。
        </div>
        <button id="agreeBtn" class="btn btn-primary">我已阅读并同意</button>
    </div>

    <div class="panel-wrapper">
        <div id="agreedStatus">✓ 已授权运行</div>

        <div class="tabs">
            <button class="tab-btn active" data-target="tab-basic">基础视觉</button>
            <button class="tab-btn" data-target="tab-keys">按键绑定</button>
            <button class="tab-btn" data-target="tab-adv">高级与外观</button>
        </div>

        <div id="tab-basic" class="tab-content active">
            <h3>视图核心</h3>
            <div class="card">
                <div class="row">
                    <label>默认视图模式</label>
                    <select id="mode">
                        <option value="partial">🔍 局部放大</option>
                        <option value="full-follow">🖼️ 整体跟随</option>
                        <option value="full-center">📐 智能避让</option>
                    </select>
                </div>
                <div class="row"><label>默认放大倍数</label><input type="number" id="zoomLevel" step="0.5" min="1.0"></div>
                <div class="row"><label>启用滚轮动态缩放</label><label class="switch"><input type="checkbox" id="wheelZoomEnabled"><span class="slider"></span></label></div>
                <div class="row"><label>微型图片智能优化</label><label class="switch"><input type="checkbox" id="smallImageOptimization"><span class="slider"></span></label></div>
            </div>

            <h3>引擎特性</h3>
            <div class="card">
                <div class="row"><label>深层 CDN 高清解析</label><select id="loadHD"><option value="true">开启</option><option value="false">关闭</option></select></div>
                <div class="row"><label>显示 HUD 画质分析</label><label class="switch"><input type="checkbox" id="showStatus"><span class="slider"></span></label></div>
                <div class="row"><label>突破视口尺寸限制</label><label class="switch"><input type="checkbox" id="breakoutView"><span class="slider"></span></label></div>
            </div>

            <h3>🌌 沉浸图库模式</h3>
            <div class="card">
                <div class="row"><label style="color: var(--primary);">强制全局沉浸加载</label><label class="switch"><input type="checkbox" id="isImmersive"><span class="slider"></span></label></div>
                <div class="row" id="preloadRow"><label>预读幻影缓存张数</label><input type="number" id="preloadCount" min="0" max="20"></div>
            </div>
        </div>

        <div id="tab-keys" class="tab-content">
            <div class="card">
                <div class="row"><label>唤醒沉浸模式</label><input type="text" id="keyImmersive" style="width: 80px;"></div>
                <div class="row"><label>视图切换 / 旋转</label><div style="display:flex;gap:6px"><input type="text" id="keyMode"><input type="text" id="keyRotate"></div></div>
                <div class="row"><label>缩放 (+ / -)</label><div style="display:flex;gap:6px"><input type="text" id="keyZoomIn"><input type="text" id="keyZoomOut"></div></div>
                <div class="row"><label>镜像反转</label><input type="text" id="keyMirror"></div>
            </div>
            <h3>沉浸流媒体指令</h3>
            <div class="card">
                <div class="row"><label>播放(Space) / 提取(D)</label><div style="display:flex;gap:6px"><input type="text" id="keyPlayVideo" placeholder="SPACE"><input type="text" id="keyDownloadVideo" placeholder="D"></div></div>
                <div class="row"><label>喜欢(L) / 关注(F)</label><div style="display:flex;gap:6px"><input type="text" id="keyLike" placeholder="L"><input type="text" id="keyFollow" placeholder="F"></div></div>
                <div class="row"><label style="color: var(--danger-color);">双连(S) / 三连(Q)</label><div style="display:flex;gap:6px"><input type="text" id="keyDouble" placeholder="S"><input type="text" id="keyTriple" placeholder="Q"></div></div>
            </div>
        </div>

        <div id="tab-adv" class="tab-content">
            <h3>外观与主题</h3>
            <div class="card">
                <div class="row vertical">
                    <label>面板背景设置</label>
                    <div class="bg-picker-row">
                        <button class="bg-btn" id="setBgWhite">⚪ 纯白</button>
                        <button class="bg-btn" id="setBgDark">⚫ 灰黑</button>
                        <button class="bg-btn" id="setBgCustom">🖼️ 自定义图片</button>
                    </div>
                    
                    <div id="customBgContainer" style="display:none; margin-top:8px; width:100%;">
                        <input type="text" id="customBgUrl" class="wide-input" placeholder="输入直链URL，或选择本地图片...">
                        <div style="display:flex; gap:6px; margin-top:8px;">
                            <button class="btn btn-secondary" id="localBgBtn" style="flex:1; padding:8px;">📁 选择图片</button>
                            <button class="btn btn-primary" id="editBgBtn" style="flex:1; padding:8px; display:none;">🎯 调整视图</button>
                        </div>
                        <input type="file" id="localBgUpload" accept="image/*" style="display:none;">
                    </div>
                </div>
                
                <div class="row">
                    <label>面板字体颜色</label>
                    <select id="fontTheme">
                        <option value="dark">浅色字体 (暗色底)</option>
                        <option value="light">深色字体 (亮色底)</option>
                    </select>
                </div>

                <div class="row">
                    <label>毛玻璃模糊度</label>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <input type="range" id="panelBlur" min="0" max="50" step="1">
                        <span id="panelBlurVal" style="font-family: ui-monospace, monospace; font-size:12px; width: 30px; text-align:right;">20px</span>
                    </div>
                </div>
            </div>

            <div style="display:flex; justify-content: space-between; align-items: baseline; margin-top: 20px;">
                <h3>操作审计日志</h3>
                <button id="clearHistoryBtn" style="background:none; border:none; color:var(--danger-color); cursor:pointer; font-size:12px; font-weight:600; padding:0;">清空</button>
            </div>
            <div class="card" style="padding: 10px 16px;">
                <div id="historyList" class="history-box"></div>
            </div>
        </div>
        
        <div class="btn-container">
            <button id="saveBtn" class="btn btn-primary">应用并保存配置</button>
            <button id="resetBtn" class="btn btn-secondary">恢复引擎默认值</button>
        </div>
        <div id="saveMsg" class="success-text">配置已写入存储！</div>
        
        <div class="footer">Mix01 Immersive Engine Core v3.0</div>
    </div>
    <script src="options.js"></script>
</body>
</html>
